<!DOCTYPE html>
<html lang="en">
<head>
    <!--The type of font we are using-->
    <meta charset="UTF-8">
    <!--Tells the -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="author" content="Arman Sendag">
    <meta name="description" content="Tables and Forms Page for SE 111">
    
    <link type="text/css" rel="stylesheet" href="style.css">

    <title>Week 5 | Tables and Forms</title>
</head>
<body>
    <h1>Birthday Party Registration Form</h1>

    <form action="confirm.html" method="GET">
        <table border = "1">
            <thead>
                <tr>
                    <th>Labels</th>
                    <th>Form Fields</th>
                </tr>
            </thead>
            

            <tbody>
                <tr>
                    <td><label for="g-first">Parent/Guardian Name</label></td>
                    <td>
                        <input type="text" id="g-first" name="gfirst" maxlength="20" required placeholder="First Name"><br>
                        <input type="text" id="g-last" name="glast" maxlength="20" required placeholder="Last Name">
                    </td>
                </tr>

                <tr>
                    <td><label for="c-first">Child's First Name</label></td>
                    <td>
                        <input type="text" id="c-first" name="cfirst" required placeholder="Child's First Name">
                    </td>
                </tr>

                <tr>
                    <td><label for="age">Child's Age</label></td>
                    <td>
                        <input type="number" id="age" name="age" required value="3">
                    </td>
                </tr>

                <tr>
                    <td><h2>Date and Time</h2></td>
                    <td></td>
                </tr>

                <tr>
                    <td><label for="date">Date</label></td>
                    <td>
                        <input type="date" id="date" name="date" required>
                    </td>
                </tr>

                <tr>
                    <td><label for="time">Start Time</label></td>
                    <td>
                        <input type="time" id="time" name="time" required>
                    </td>
                </tr>

                <tr>
                    <td><label for="guests">Number of Guests</label></td>
                    <td>
                        <input type="number" id="guests" name="guests" required value="5">
                    </td>
                </tr>

                <tr>
                    <td><h2>Food</h2></td>
                    <td></td>
                </tr>

                <tr>
                    <td><label for="size">Size</label></td>
                    <td>
                        <input type="radio" id="sm" name="size" value="sm">
                        <label for="sm">sm</label>

                        <input type="radio" id="md" name="size" value="md">
                        <label for="md">med</label>

                        <input type="radio" id="lg" name="size" value="lg">
                        <label for="lg">lg</label>
                    </td>
                </tr>

                <tr>
                    <td>Drinks</td>
                    <td>
                        <input type="checkbox" id="drink1" name="drink1" value="coke" checked>
                        <label for="drink1">Coke</label><br>

                        <input type="checkbox" id="drink2" name="drink2" value="sprite">
                        <label for="drink2">Sprite</label><br>

                        <input type="checkbox" id="drink3" name="drink3" value="fruit punch">
                        <label for="drink3">fruit punch</label><br>

                        <input type="checkbox" id="drink4" name="drink4" value="lemonade">
                        <label for="drink4">lemonade</label><br>

                        <input type="checkbox" id="drink5" name="drink5" value="iced tea">
                        <label for="drink5">Iced Tea</label>
                    </td>
                    </tr>

                    <tr>
                    <td><label for="cake">Cake</label></td>
                    <td>
                        <select id="cake" name="cake">
                        <option value="chocolate">Chocolate</option>
                        <option value="vanilla">Vanilla</option>
                        <option value="strawberry">Strawberry</option>
                        </select>
                    </td>
                </tr>

                <tr>
                    <td><h2>Decorations</h2></td>
                    <td></td>
                    </tr>

                    <tr>
                    <td><label for="colors">Color Scheme</label></td>
                    <td>
                        Choose a color scheme for the party<br>
                        <input type="color" id="colors" name="colors">
                    </td>
                </tr>

                <tr>
                    <td><label for="comments">Additional Comments</label></td>
                    <td>
                        <textarea id="comments" name="comments" placeholder="Please add any additional comments"></textarea>
                    </td>
                </tr>

                <tr>
                    <td></td>
                    <td>
                        <input type="submit" value="submit">
                    </td>
                </tr>

            </tbody>
        </table>
    </form>
    
</body>
</html>
