<!DOCTYPE html>
<html lang="en">
<head>
    <!--The type of font we are using-->
    <meta charset="UTF-8">
    <!--Tells the -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="author" content="Arman Sendag">
    <meta name="description" content="JavaScript Pay Calculator for SE 111">
    
    <link type="text/css" rel="stylesheet" href="style.css">

    <title>Week 6 | JavaScript Pay Calculator</title>
</head>
<body>
    <script>
        const taxRate = 0.20;
        const hourlyPay = Number(prompt("Enter your hourly pay:"));
        const hoursWorked = Number(prompt("Enter the total hours worked for two weeks:"));

        const grossPay = hourlyPay * hoursWorked;
        const uncleSamShare = grossPay * taxRate;
        const netPay = grossPay - uncleSamShare;

        const output =
        "Gross Pay: $" + grossPay.toFixed(2) + "\n" +
        "Uncle Sam's Share: $" + uncleSamShare.toFixed(2) + "\n" +
        "Net Pay: $" + netPay.toFixed(2);

        alert(output);

        console.log("Gross Pay: $" + grossPay.toFixed(2));
        console.log("Uncle Sam's Share: $" + uncleSamShare.toFixed(2));
        console.log("Net Pay: $" + netPay.toFixed(2));
    </script>
</body>
</html>
